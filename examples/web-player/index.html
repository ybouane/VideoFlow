<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoFlow — DOM Renderer Example</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
	font-family: system-ui, -apple-system, sans-serif;
	background: #111;
	color: #eee;
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	min-height: 100vh;
	padding: 20px;
}

h1 {
	font-size: 1.4rem;
	margin-bottom: 16px;
	font-weight: 500;
	color: #aaa;
}

#player-container {
	background: #000;
	border-radius: 8px;
	overflow: hidden;
	box-shadow: 0 4px 24px rgba(0,0,0,0.5);
	max-width: 100%;
	width:1920px;
}
#player {
	aspect-ratio: 16 / 9;
	width: 100%;
	overflow:hidden;
}

.controls {
	display: flex;
	align-items: center;
	gap: 12px;
	padding: 12px 16px;
	background: #1a1a1a;
	border-top: 1px solid #333;
}

.controls button {
	background: #333;
	border: none;
	color: #fff;
	padding: 8px 16px;
	border-radius: 6px;
	cursor: pointer;
	font-size: 0.85rem;
	font-weight: 500;
	transition: background 0.15s;
}

.controls button:hover { background: #444; }
.controls button:active { background: #555; }
.controls button.active { background: #2563eb; }

.controls input[type="range"] {
	flex: 1;
	height: 4px;
	-webkit-appearance: none;
	appearance: none;
	background: #444;
	border-radius: 2px;
	outline: none;
}
.controls input[type="range"]::-webkit-slider-thumb {
	-webkit-appearance: none;
	width: 14px;
	height: 14px;
	border-radius: 50%;
	background: #fff;
	cursor: pointer;
}

.controls .time {
	font-size: 0.8rem;
	color: #888;
	font-variant-numeric: tabular-nums;
	min-width: 90px;
	text-align: center;
}

.controls .fps {
	font-size: 0.75rem;
	color: #666;
	min-width: 60px;
	text-align: right;
}

.controls .download-btn {
	font-size: 1.1rem;
	padding: 6px 10px;
	line-height: 1;
}

#status {
	margin-top: 12px;
	font-size: 0.8rem;
	color: #666;
}

/* ── Export modal ── */

.modal-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.7);
	display: flex;
	align-items: center;
	justify-content: center;
	z-index: 1000;
	backdrop-filter: blur(4px);
}
.modal-overlay[hidden] { display: none; }

.modal {
	background: #1e1e1e;
	border: 1px solid #333;
	border-radius: 12px;
	padding: 28px 32px;
	min-width: 340px;
	max-width: 420px;
	text-align: center;
	box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

.modal h2 {
	font-size: 1.1rem;
	font-weight: 600;
	margin-bottom: 20px;
	color: #eee;
}

.modal .progress-bar-track {
	width: 100%;
	height: 6px;
	background: #333;
	border-radius: 3px;
	overflow: hidden;
	margin-bottom: 12px;
}

.modal .progress-bar-fill {
	height: 100%;
	background: #2563eb;
	border-radius: 3px;
	width: 0%;
	transition: width 0.15s ease;
}

.modal .progress-text {
	font-size: 0.85rem;
	color: #888;
	margin-bottom: 20px;
	font-variant-numeric: tabular-nums;
}

.modal button {
	background: #333;
	border: none;
	color: #fff;
	padding: 8px 24px;
	border-radius: 6px;
	cursor: pointer;
	font-size: 0.85rem;
	font-weight: 500;
	transition: background 0.15s;
}
.modal button:hover { background: #444; }
.modal button.danger { background: #7f1d1d; }
.modal button.danger:hover { background: #991b1b; }

.toolbar {
	display: flex;
	align-items: center;
	gap: 12px;
	margin-bottom: 12px;
}

.toolbar select {
	background: #222;
	color: #eee;
	border: 1px solid #444;
	padding: 8px 12px;
	border-radius: 6px;
	font-size: 0.9rem;
	cursor: pointer;
	outline: none;
}
.toolbar select:hover { border-color: #666; }
</style>
</head>
<body>

<h1>VideoFlow DOM Renderer</h1>

<div class="toolbar">
	<select id="example-select"></select>
</div>

<div id="player-container">
	<div id="player"></div>
	<div class="controls">
		<button id="btn-play">Play</button>
		<button id="btn-stop">Stop</button>
		<input type="range" id="seek" min="0" value="0" step="1">
		<span class="time" id="time">0:00.0 / 0:00.0</span>
		<span class="fps" id="fps-display"></span>
		<button id="btn-download" class="download-btn" title="Export to MP4">⬇️</button>
	</div>
</div>

<div id="status">Loading...</div>

<div class="modal-overlay" id="export-modal" hidden>
	<div class="modal">
		<h2 id="export-title">Exporting video...</h2>
		<div class="progress-bar-track">
			<div class="progress-bar-fill" id="export-progress-bar"></div>
		</div>
		<p class="progress-text" id="export-progress-text">0%</p>
		<button id="export-cancel" class="danger">Cancel</button>
	</div>
</div>

<script type="module" src="./player.js"></script>
</body>
</html>
